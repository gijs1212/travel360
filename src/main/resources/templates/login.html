<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inloggen - Travel360</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main>
    <section class="section">
        <h1>Inloggen</h1>
        <p>Gebruik je gebruikersnaam of e-mailadres en wachtwoord.</p>
        <div th:if="${param.error}" class="alert error">Onjuiste combinatie. Probeer opnieuw.</div>
        <div th:if="${param.logout}" class="alert success">Je bent uitgelogd.</div>
        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Gebruikersnaam of e-mail</label>
                <input id="username" name="username" type="text" required>
            </div>
            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input id="password" name="password" type="password" required>
            </div>
            <button type="submit">Inloggen</button>
        </form>
        <p>Nog geen account? <a th:href="@{/register}">Registreer als commenter</a>.</p>
    </section>
</main>
</body>
</html>
